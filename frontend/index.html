<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="https://picsum.photos/32/32" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocFlow AI - 智能文档排版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://esm.sh/katex@0.16.9/dist/katex.min.css">
  <style>
    body {
      font-family: 'Noto Sans SC', sans-serif;
    }

    .serif {
      font-family: 'Noto Serif SC', serif;
    }

    /* Custom scrollbar for clean look */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #d4d4d8;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a1a1aa;
    }

    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Figure Caption Styles */
    .figure-caption {
      text-align: center;
      font-family: inherit;
      font-size: 0.9em;
      color: #4b5563;
      /* zinc-600 */
      margin-top: 8px;
      margin-bottom: 24px;
      display: block;
      width: 100%;
    }

    .table-caption {
      text-align: center;
      font-family: inherit;
      font-weight: bold;
      margin-bottom: 8px;
      margin-top: 16px;
      display: block;
    }
  </style>
  <script type="importmap">
  {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
          "react/": "https://esm.sh/react@^19.2.4/",
          "react": "https://esm.sh/react@^19.2.4",
          "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
          "docx": "https://esm.sh/docx@8.5.0",
          "mammoth": "https://esm.sh/mammoth@1.6.0",
          "jszip": "https://esm.sh/jszip@3.10.1",
          "katex": "https://esm.sh/katex@0.16.9"
      }
    }

    </script>
  <link rel="stylesheet" href="/index.css">
</head>

<body
  class="bg-zinc-50 text-zinc-900 h-screen overflow-hidden antialiased selection:bg-indigo-100 selection:text-indigo-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
